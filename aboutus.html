<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About us</title>

<body>
     <style>
       /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* BODY */
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e5e7eb;
    padding: 30px;
}

/* CONTAINER STYLE */
body > * {
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
}

/* HEADING */
h1 {
    text-align: center;
    font-size: 42px;
    margin-bottom: 20px;
    color: #00c2ff;
}

/* PARAGRAPHS */
p {
    line-height: 1.8;
    margin-bottom: 20px;
    font-size: 17px;
    text-align: center;
}

/* LINKS (SOCIALS) */
a {
    display: inline-block;
    margin: 10px 10px;
    text-decoration: none;
    color: #00c2ff;
    border: 1px solid #00c2ff;
    padding: 10px 15px;
    border-radius: 20px;
    transition: 0.3s;
}

/* Hover effect */
a:hover {
    background: #00c2ff;
    color: #000;
    transform: translateY(-2px);
}

/* BUTTONS */
button {
    display: inline-block;
    margin: 30px 10px 0;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #00c2ff, #0077b6);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
button:hover {
    transform: translateY(-3px);
    background: linear-gradient(135deg, #0077b6, #023e8a);
}

/* BUTTON CONTAINER ALIGNMENT */
button {
    display: inline-block;
}

body {
    text-align: center;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    h1 {
        font-size: 30px;
    }

    p {
        font-size: 15px;
    }
}
    </style>
     
    <h1>

    </h1>
