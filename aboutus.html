<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About us</title>
</head>
<body>
     <style>
    /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    text-align: center;
    padding: 40px 20px;
}

/* Title */
h1 {
    font-size: 40px;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

/* Paragraph */
p {
    font-size: 18px;
    max-width: 500px;
    margin: 0 auto 30px;
    line-height: 1.6;
    color: #ccc;
}

/* Social links */
a {
    display: inline-block;
    margin: 10px;
    padding: 10px 20px;
    border-radius: 25px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.1);
    transition: 0.3s;
}

a:hover {
    background: white;
    color: black;
}

/* Button */
button {
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: black;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: gray;
    color: white;
}

/* Mobile */
@media (max-width: 600px) {
    h1 {
        font-size: 28px;
    }

    p {
        font-size: 16px;
    }
}
     </style>
    
     
    <h1>
        About us
    </h1>

    <P> 
        we are a brand that offer quality clothes
    </P>

</body>
</html>
