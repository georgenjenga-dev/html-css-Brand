<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - Once Upon Us</title>

</head>
<body>
    <style>
        /* Explore Page */
.explore-page {
    padding: 120px 20px;
    text-align: center;
    background: #000;
    color: white;
}

.explore-page h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.explore-page p {
    margin-bottom: 40px;
    color: #ccc;
}

/* Grid */
.explore-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* Cards */
.explore-card {
    position: relative;
    overflow: hidden;
    border-radius: 10px;
}

.explore-card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    transition: 0.4s;
}

/* Hover Effect */
.explore-card:hover img {
    transform: scale(1.1);
}

/* Overlay */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: rgba(0,0,0,0.6);
    text-align: center;
    font-size: 18px;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: #000;
}
    </style>
