    <style>
        /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    color: white;
    padding: auto;
}
        /* Navbar */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.logo img {
    width: 50px;
    border-radius: 50%;
}

.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 20px;
    transition: 0.3s;
}

.nav-links a:hover {
    background: white;
    color: black;
}

        .products {
    padding: 120px 20px 60px;
    background: #111;
    text-align: center;
}

.products h1 {
    margin-bottom: 40px;
    font-size: 32px;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
}

.product-card {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-10px);
}

.product-card img {
    width: 100%;
    border-radius: 10px;
}

.product-card h3 {
    margin: 10px 0;
}

.product-card button {
    padding: 10px 20px;
    border: none;
    background: white;
    color: black;
    border-radius: 20px;
    cursor: pointer;
}

.product-card button:hover {
    background: gray;
    color: white;
}
    </style>
