<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men clothing</title>

<body>
    <style>
        /* Page background */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
}

/* Title (optional if you add one) */
h1 {
    text-align: center;
    margin: 20px 0;
}

/* Image Grid */
.image {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* Images */
.image img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 10px;
    transition: 0.4s;
}

/* Hover effect */
.image img:hover {
    transform: scale(1.05);
    opacity: 0.8;
}
    </style>
    <div class="image">

    </div>
</body>
</html>
